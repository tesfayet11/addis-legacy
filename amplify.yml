version: 1
frontend:
  phases:
    preBuild:
        commands:
          - node -v
          - npm -v
          - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*